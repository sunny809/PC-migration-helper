name: Build PC Migration Helper

permissions:
  contents: write

on:
  push:
    branches: [main, master]
    tags: ["v*"]          # Release tags: v0.3, v0.4, etc.
  pull_request:
    branches: [main, master]
  workflow_dispatch:       # Allow manual trigger

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short

  build:
    name: Build executable
    runs-on: windows-latest
    needs: test
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Download UPX (executable packer)
        shell: pwsh
        run: |
          curl -L -o upx.zip https://github.com/upx/upx/releases/download/v5.1.0/upx-5.1.0-win64.zip
          Expand-Archive upx.zip -DestinationPath .
          echo "$((Get-Item .\upx-*\upx.exe).Directory.FullName)" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build with PyInstaller
        run: |
          python scripts/build.py

      - name: Upload artifact (build run)
        uses: actions/upload-artifact@v4
        with:
          name: PC-migration-helper-Windows-x64
          path: dist/PC-Migration-Helper/
          if-no-files-found: error
          compression-level: 6

      - name: Package for release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          # Create a zip of the build for the release
          Compress-Archive -Path dist/PC-Migration-Helper/* -DestinationPath PC-migration-helper-Windows-x64.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        uses: softprops/action-gh-release@v2
        with:
          name: PC Migration Helper ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: false
          files: |
            PC-migration-helper-Windows-x64.zip
          fail_on_unmatched_files: false